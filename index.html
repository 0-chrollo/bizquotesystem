          <style>

            *{
                
                box-sizing: border-box;
                
                margin: 0; 
                padding: 0;
            
             }
        
            /* ── HERO ──────────────────────────────────────────── */
            .hero {
              position: relative;
              min-height:75vh;
              display: flex;
              flex-direction: column;
              justify-content: flex-end;
              overflow: visible;
        
              background-image:
                linear-gradient(
                  to bottom,
                  rgba(10, 10, 10, 0.18) 0%,
                  rgba(10, 10, 10, 0.52) 60%,
                  rgba(10, 10, 10, 0.82) 100%
                ),
                url("https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1800&q=80");
              background-size: cover;
              background-position: center 40%;
              background-repeat: no-repeat;
        
              font-family: 'Georgia', 'Times New Roman', serif;
            }
        
            /* ── Hero inner text ─── */
            .hero__inner {
              padding: clamp(2rem, 6vw, 5rem) clamp(1.5rem, 8vw, 7rem);
              padding-bottom: clamp(4rem, 10vw, 7rem);
              max-width: 680px;
            }
        
            .hero__eyebrow {
              display: inline-block;
              font-family: 'Courier New', monospace;
              font-size: 0.7rem;
              letter-spacing: 0.28em;
              text-transform: uppercase;
              color: rgba(255,255,255,0.55);
              margin-bottom: 1.1rem;
            }
        
            .hero__title {
              margin: 0 0 1rem;
              font-size: clamp(2.8rem, 7vw, 5.5rem);
              font-weight: 400;
              line-height: 1.05;
              color: #fff;
              letter-spacing: -0.02em;
            }
        
            .hero__sub {
              margin: 0;
              font-size: clamp(0.95rem, 1.6vw, 1.15rem);
              color: rgba(255,255,255,0.65);
              font-style: italic;
              letter-spacing: 0.01em;
              line-height: 1.6;
            }
        
            /* ── Overlapping card wrapper ─── */
            .hero__card-wrap {
              display: flex;
              justify-content: center;
              padding: 0 clamp(1.5rem, 6vw, 4rem);
              margin-bottom: -8rem;
              position: relative;
              z-index: 10;
            }
        
            /* ── Card ─── */
            .hero__card {
              background: #fff;
       
              padding: clamp(2rem, 4vw, 3rem) clamp(1.8rem, 4vw, 3rem);
              width: 100%;
              max-width: 780px;
              box-shadow:
                0 8px 40px rgba(0,0,0,0.14),
                0 2px 8px rgba(0,0,0,0.08);
        
              animation: cardRise 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
            }
        
            @keyframes cardRise {
              from { opacity: 0; transform: translateY(28px); }
              to   { opacity: 1; transform: translateY(0); }
            }
        
            .hero__card-label {
              margin: 0 0 0.75rem;
              font-family: 'Courier New', monospace;
              font-size: 0.68rem;
              letter-spacing: 0.26em;
              text-transform: uppercase;
              color: #aaa;
            }
        
            .hero__card-heading {
              margin: 0 0 0.9rem;
              font-size: clamp(1.35rem, 2.8vw, 1.85rem);
              font-weight: 400;
              line-height: 1.2;
              color: #111;
              letter-spacing: -0.01em;
            }
        
            .hero__card-body {
              margin: 0 0 1.6rem;
              font-size: clamp(0.88rem, 1.3vw, 0.98rem);
              color: #666;
              line-height: 1.7;
            }
        
            .hero__card-cta {
              display: inline-block;
              font-family: 'Courier New', monospace;
              font-size: 0.82rem;
              letter-spacing: 0.06em;
              color: #111;
              text-decoration: none;
              border-bottom: 1px solid #111;
              padding-bottom: 2px;
              transition: opacity 0.2s;
            }
            .hero__card-cta:hover {
                 opacity: 0.45; 
                }
        
            /* ── Section below (to show the overlap) ─── */
            .below {
              background: #f5f4f1;
              padding: 8rem clamp(1.5rem, 8vw, 7rem) 5rem;
              font-family: 'Georgia', serif;
              color: #999;
              font-size: 0.85rem;
              letter-spacing: 0.06em;
              text-align: center;
              text-transform: uppercase;
            }
        
            /* ── Responsive ─── */
            @media (max-width: 600px) {
              .hero__card {
            
                
                }

              .hero__card-wrap {
                 margin-bottom: -10.5rem;
                
                }
            }

            @media (max-width: 480px) {
              .hero__card {
        
                
                }

              .hero__card-wrap {
                 margin-bottom: -10.5rem;
                
                }

            }

                    <style>
              
                  
              
                      .tm-form {
                    
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        flex-direction: column;
                    
                      }
                    
                      .containerd {
                          padding: 5px;
                        display: flex;
                        flex-wrap: wrap;
                        gap: 40px;
                        width: 100%;
                        max-width: 800px;
                      }
                    
                      .column-1,
                      .column-2 {
                        flex: 1 1 45%;
                        box-sizing: border-box;
                      }
                    
                      @media (max-width: 768px) {
                        .column-1,
                        .column-2 {
                          flex: 1 1 100%;
                        }
                      }
                    
                      .form-container {
                        background: white;
                        padding: 20px;
                        border-radius: 1px;
                        box-shadow: 0px 4px 10px rgba(48, 48, 48, 0.051);
                        margin-bottom: 30px;
                      }
                    
                      .form-group {
                        margin-bottom: 15px;
                        display: flex;
                        flex-wrap: wrap;
                        gap: 10px;
                      }
                    
                      .form-group label {
                        flex: 1 1 100%;
                        font-size: 15px;
                        font-weight: bold;
                        color: rgb(16, 51, 71);
                      }
                    
                      .form-group input,
                      .form-group select,
                      .form-group textarea {
                        flex: 1;
                        padding: 10px;
                        font-size: 12px;
                        border: 1px solid #ccc;
                        border-radius: 2px;
                        width: 100%;
                      }
                    
                      .btn-submit {
                        background-color: rgb(16, 51, 71);
                        color: white;
                        font-size: 14px;
                        padding: 13px;
                        font-family:'Lucida Sans', Arial, sans-serif;
                        border: 3px solid rgb(255, 136, 18);
                        border-radius: 20px;
                        cursor: pointer;
                        width: 100%;
                        transition: 0.3s;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        gap: 10px;
                      }
                    
                      .btn-submit:hover {
                        background-color: rgb(20, 20, 20);
                      }
                    
                      @media (min-width: 480px) {
                        .name-group {
                          display: flex;
                          gap: 10px;
                        }
                    
                        .name-group input {
                          flex: 1;
                        }
                      }
                    
                    
                      
                    /* Popup Styles */
                    .popup-overlay {
                        position: fixed; 
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        background: rgba(0, 0, 0, 0.5);
                        backdrop-filter: blur(8px);
                        -webkit-backdrop-filter: blur(8px);
                        display: none;
                        justify-content: center;
                        align-items: center;
                        z-index: 9999;
                      }
                    
                      .popup-box {
                        background:  rgb(6, 40, 61);
                        padding: 2rem 3rem;
                        border-top-right-radius: 15px;
                       border-bottom-left-radius: 15px;
                        text-align: center;
                        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
                        width: 50%;
                        max-width: 600px;
                        min-width: 300px;
                      }
                    
                      @media (max-width: 768px) {
                        .popup-box {
                          width: 85%;
                        }
                      }
                    
                    
                      .popup-box {
                        background: rgb(6, 40, 61);
                        padding: 2rem 3rem;
                        border-top-right-radius: 15px;
                       border-bottom-left-radius: 15px;
                        text-align: center;
                        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
                      }
                    
                      .popup-box i {
                        margin-bottom: 1rem;
                        color: rgb(255, 255, 255);
                      }
                    
                      .popup-box p {
                        font-size: 1.2rem;
                        margin-bottom: 1rem;
                        color: #f9f9f9;
                      }
                    
                      .popup-box button {
                        background-color: rgba(233, 241, 246, 0.922);
                        color:rgb(43, 65, 79);
                        border: none;
                        padding: 0.6rem 1.2rem;
                        font-size: 1.1rem;
                       border-top-right-radius: 14px;
                       border-bottom-left-radius: 14px;
                        cursor: pointer;
                      }
                    
                      .popup-box button:hover {
                        background-color: rgb(255, 255, 255);
                      }
                    </style>
                    
                    
                    
                    <div style="text-align:center;margin-top:vh;" >
                      <h2 style="font-size: 1.1rem; font-weight: 600;color:rgb(16, 51, 71); padding:10px;">Quote Request Form</h2> 
                    </div>
                    
                    
                    
                    <div class="containerd">
                      <!-- Column 1: Form -->
                    <div class="column-1">
                    <form action="https://formsubmit.co/info@phiribathongconsulting.co.za" method="POST">
                    <input type="hidden" name="_next" value="https://www.phiribathongconsulting.co.za/contact.html?submitted=true">
                    <input type="hidden" name="_subject" value="New Service Inquiry - Phiribathong Consulting">
                    <input type="hidden" name="_template" value="table">
                    <input type="hidden" name="_captcha" value="false">
                    
                    <div class="form-group name-group">
                      <input type="text" name="firstName" placeholder="First Name" required>
                      <input type="text" name="surname" placeholder="Surname" required>
                    </div>
                    
                    <div class="form-group">
                      <input type="email" name="email" placeholder="Email Address" required>
                    </div>
                    
                    <div class="form-group">
                      <input type="tel" name="phone" placeholder="Phone Number" required>
                    </div>
                    
                  
                    
                    <div class="form-group">
                      <label>What structure are you interested in?</label>
                      <select name="serviceType" required>
                        <option value="">Select a service...</option>
                        <option value="Digital Marketing">Digital Marketing</option>
                        <option value="SEO & Social Media">SEO & Social Media Management</option>
                        <option value="Building Construction">Building Construction</option>
                        <option value="Renovation Services">Renovation Services</option>
                        <option value="Solar Panel Installation">Solar Panel Installation</option>
                        <option value="Plumbing Services">Plumbing Services</option>
                        <option value="Electrical Work">Electrical Work</option>
                        <option value="Procurement Solutions">Procurement Solutions</option>
                        <option value="Property Maintenance">Property Maintenance</option>
                        <option value="Multiple Services">Multiple Services</option>
                      </select>
                    </div>
                    
                    <div class="form-group">
                      <label>Project Type</label>
                      <select name="projectType" required>
                        <option value="">Select...</option>
                        <option value="Residential">Residential</option>
                        <option value="Commercial">Commercial</option>
                        <option value="Industrial">Industrial</option>
                      </select>
                    </div>
                    
                    <div class="form-group">
                      <input type="text" name="location" placeholder="Property/Project Location ">
                    </div>
                    
                    
                    
                    
                    
                    <div class="form-group">
                      <textarea name="projectDetails" rows="5" placeholder="Tell us about your project - What are your goals? Any specific requirements or challenges we should know about? (Optional)" required></textarea>
                    </div>
                    
                    
                    <button type="submit" class="btn-submit">
                      <i class="fas fa-paper-plane"></i> Request Quote
                    </button>
                    </form>
                    
                    <!-- Success Popup -->
                    <div id="successPopup" class="popup-overlay">
                    <div class="popup-box">
                      <i class="fas fa-check-circle fa-3x" style="color: rgb(223, 223, 223);"></i>
                      <p>Thank you! We've received your inquiry and our team will contact you shortly to discuss your project.</p>
                      <button onclick="closePopup()">Close</button>
                    </div>
                    </div>
                    </div>
              
            
              </div>
            </div>
          </section>
